name: Build and Publish
on:
  push: 
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      # Allow running workflow manually
  workflow_dispatch:
  
# Set permissions of the GITHUB_TOKEN to allow deployment to github pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-publish:
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      concurrency: ci-${{github.ref}}
      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Rust setup
          uses: actions-rust-lang/setup-rust-toolchain@v1
          with:
            target: wasm32-unknown-unknown

        - name: Trunk setup
          run: cargo install --locked trunk

        - name: Build
          run: trunk build --release

        - name: Fix github-pages specific 404 issue
          # Github shows 404 if you try to navigate to a subpage of the application.
          # To get around this, we specify a custom 404 page that just happens to be the main application.
          # See https://garrit.xyz/posts/2023-06-01-single-page-applications-on-github-pages for more info
          run:  cp ./dist/index.html ./dist/404.html

        - name: Setup Pages
          uses: actions/configure-pages@v5

        - name: Upload artifact
          uses: actions/upload-pages-artifact@v4
          with:
            # Upload the public directory
            path: './dist'

        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4